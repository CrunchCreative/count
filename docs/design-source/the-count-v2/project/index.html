<title>The Count — Pattern Engine</title>

<script>
// Replace ResizeObserver with a stub — we don't need it and it fires spurious browser warnings.
window.ResizeObserver = class { observe() {} unobserve() {} disconnect() {} };
window.addEventListener('error', (e) => {
  if (e.message && String(e.message).indexOf('ResizeObserver') !== -1) {
    e.stopImmediatePropagation();
    e.preventDefault();
  }
}, true);
</script>

<style>
  /* Page background outside the bezel */
  html, body {
    height: 100%;
    background: radial-gradient(ellipse at center,
      #15171b 0%,
      #0a0b0d 60%,
      #050608 100%);
    background-attachment: fixed;
    overflow: hidden;
  }
  #root {
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .stage {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  /* Inside-bezel host */
  .bezel-content {
    position: absolute;
    inset: 0;
    background: var(--bg-page);
    overflow: hidden;
  }
</style>
