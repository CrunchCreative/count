<!doctype html>
<html><head>
<meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html, body { margin:0; background:#08090B; height:100%; }
  .preview-card {
    position: relative;
    width: 100%;
    min-height: 160px;
    padding: 20px 22px;
    box-sizing: border-box;
    font-family: var(--font-sans);
    color: var(--t-pri);
    overflow: hidden;
  }
  .preview-card .bg-gradients {
    position: absolute; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,181,58,0.08) 0%, transparent 60%),
      radial-gradient(circle 60% at 90% 100%, rgba(29,110,86,0.06) 0%, transparent 65%);
  }
  .preview-card > .content { position: relative; z-index: 1; }
  
</style>
</head><body>
<div class="preview-card">
  <div class="bg-gradients"></div>
  <div class="content">
      <div style="display:grid;grid-template-columns:repeat(3, 1fr); gap: 12px">
        <div>
          <div style="height:64px;border-radius:10px;background:#08090B;border:0.5px solid var(--b-def)"></div>
          <div class="tc-cap" style="margin-top:8px"><span style="color:var(--t-pri)">Page</span> · #08090B</div>
        </div>
        <div>
          <div style="height:64px;border-radius:10px;background:#0B1A14;border:0.5px solid var(--b-def)"></div>
          <div class="tc-cap" style="margin-top:8px"><span style="color:var(--t-pri)">Hero</span> · #0B1A14</div>
        </div>
        <div>
          <div style="height:64px;border-radius:10px;background:rgba(0,0,0,0.20);border:0.5px solid var(--b-def); box-shadow: inset 0 1px 0 rgba(255,255,255,0.04)"></div>
          <div class="tc-cap" style="margin-top:8px"><span style="color:var(--t-pri)">Inset</span> · rgba(0,0,0,.20)</div>
        </div>
      </div>
    </div>
</div>
</body></html>
