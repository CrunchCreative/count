<!doctype html>
<html><head>
<meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html, body { margin:0; background:#08090B; height:100%; }
  .preview-card {
    position: relative;
    width: 100%;
    min-height: 130px;
    padding: 20px 22px;
    box-sizing: border-box;
    font-family: var(--font-sans);
    color: var(--t-pri);
    overflow: hidden;
  }
  .preview-card .bg-gradients {
    position: absolute; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,181,58,0.08) 0%, transparent 60%),
      radial-gradient(circle 60% at 90% 100%, rgba(29,110,86,0.06) 0%, transparent 65%);
  }
  .preview-card > .content { position: relative; z-index: 1; }
  
</style>
</head><body>
<div class="preview-card">
  <div class="bg-gradients"></div>
  <div class="content">
      <div class="tc-cap" style="margin-bottom: 12px; color: var(--t-mut)">Loss / red · used sparingly · for L scorelines, missed legs, lost builders</div>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="score-pill L" style="padding: 6px 12px; font-size: 13px">3-1A</span>
        <span class="status-pill lost">Lost</span>
        <span style="
          display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;
          background:rgba(180,55,55,0.12); border:0.5px solid rgba(180,55,55,0.30); color:#F09595;
          box-shadow:0 0 6px rgba(180,55,55,0.20);
        ">×</span>
        <span class="tc-cap" style="font-family:var(--font-mono); color: #F09595; font-size: 11px">Text · #F09595</span>
      </div>
    </div>
</div>
</body></html>
