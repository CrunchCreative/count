<!doctype html>
<html><head>
<meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html, body { margin:0; background:#08090B; height:100%; }
  .preview-card {
    position: relative;
    width: 100%;
    min-height: 160px;
    padding: 20px 22px;
    box-sizing: border-box;
    font-family: var(--font-sans);
    color: var(--t-pri);
    overflow: hidden;
  }
  .preview-card .bg-gradients {
    position: absolute; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,181,58,0.08) 0%, transparent 60%),
      radial-gradient(circle 60% at 90% 100%, rgba(29,110,86,0.06) 0%, transparent 65%);
  }
  .preview-card > .content { position: relative; z-index: 1; }
  
</style>
</head><body>
<div class="preview-card">
  <div class="bg-gradients"></div>
  <div class="content">
      <div class="tc-cap" style="margin-bottom: 12px; color: var(--t-mut)">All 0.5px hairlines · over the dark page background</div>
      <div style="display:grid;grid-template-columns:repeat(3, 1fr); gap: 12px">
        <div style="padding:14px;border-radius:10px; background:rgba(255,255,255,0.02);border:0.5px solid rgba(255,255,255,0.04)">
          <div class="tc-cap" style="font-family:var(--font-mono);font-size:10px;color:var(--t-faint)">FAINTEST</div>
          <div class="tc-cap" style="margin-top:4px;font-size:11px">rgba(255,255,255,0.04)</div>
        </div>
        <div style="padding:14px;border-radius:10px; background:rgba(255,255,255,0.025); border:0.5px solid rgba(255,255,255,0.06)">
          <div class="tc-cap" style="font-family:var(--font-mono);font-size:10px;color:var(--t-hint)">DEFAULT</div>
          <div class="tc-cap" style="margin-top:4px;font-size:11px">rgba(255,255,255,0.06)</div>
        </div>
        <div style="padding:14px;border-radius:10px; background:rgba(255,255,255,0.03); border:0.5px solid rgba(255,255,255,0.10)">
          <div class="tc-cap" style="font-family:var(--font-mono);font-size:10px;color:var(--t-mut)">STRONGER</div>
          <div class="tc-cap" style="margin-top:4px;font-size:11px">rgba(255,255,255,0.10)</div>
        </div>
      </div>
    </div>
</div>
</body></html>
