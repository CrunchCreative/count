<!doctype html>
<html><head>
<meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html, body { margin:0; background:#08090B; height:100%; }
  .preview-card {
    position: relative;
    width: 100%;
    min-height: 170px;
    padding: 20px 22px;
    box-sizing: border-box;
    font-family: var(--font-sans);
    color: var(--t-pri);
    overflow: hidden;
  }
  .preview-card .bg-gradients {
    position: absolute; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,181,58,0.08) 0%, transparent 60%),
      radial-gradient(circle 60% at 90% 100%, rgba(29,110,86,0.06) 0%, transparent 65%);
  }
  .preview-card > .content { position: relative; z-index: 1; }
  
</style>
</head><body>
<div class="preview-card">
  <div class="bg-gradients"></div>
  <div class="content">
      <div class="tc-cap" style="margin-bottom: 14px; color: var(--t-mut)">The core data primitive · three tiers · threshold above, hit-rate below</div>
      <div style="display:flex;align-items:center;gap:14px">
        <div style="text-align: center">
          <span class="safe-pill teal" style="padding:6px 10px"><span class="v">8+</span><span class="r">5/5</span></span>
          <div class="tc-cap" style="margin-top:8px; font-size:10px;">5/5 · teal · "bulletproof"</div>
        </div>
        <div style="text-align: center">
          <span class="safe-pill amber" style="padding:6px 10px"><span class="v">↑4.5</span><span class="r">4/5</span></span>
          <div class="tc-cap" style="margin-top:8px; font-size:10px;">4/5 · amber · ceiling</div>
        </div>
        <div style="text-align: center">
          <span class="safe-pill amber" style="padding:6px 10px"><span class="v">↓3</span><span class="r">4/5</span></span>
          <div class="tc-cap" style="margin-top:8px; font-size:10px;">Lower-is-better · amber</div>
        </div>
        <div style="text-align: center">
          <span class="safe-pill muted" style="padding:6px 10px"><span class="v">—</span><span class="r">2/5</span></span>
          <div class="tc-cap" style="margin-top:8px; font-size:10px;">Muted · no pattern</div>
        </div>
      </div>
    </div>
</div>
</body></html>
