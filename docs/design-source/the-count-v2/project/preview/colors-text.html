<!doctype html>
<html><head>
<meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html, body { margin:0; background:#08090B; height:100%; }
  .preview-card {
    position: relative;
    width: 100%;
    min-height: 230px;
    padding: 20px 22px;
    box-sizing: border-box;
    font-family: var(--font-sans);
    color: var(--t-pri);
    overflow: hidden;
  }
  .preview-card .bg-gradients {
    position: absolute; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,181,58,0.08) 0%, transparent 60%),
      radial-gradient(circle 60% at 90% 100%, rgba(29,110,86,0.06) 0%, transparent 65%);
  }
  .preview-card > .content { position: relative; z-index: 1; }
  
</style>
</head><body>
<div class="preview-card">
  <div class="bg-gradients"></div>
  <div class="content">
      <div class="tc-cap" style="margin-bottom: 12px; color: var(--t-mut)">Warm off-white scale · 5 steps · sans throughout</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        
          <div style="display:grid;grid-template-columns:24px 90px 1fr 120px;gap:14px;align-items:center">
            <span style="width:18px;height:18px;border-radius:4px;background:#F2F0E8"></span>
            <span style="color:#F2F0E8; font-size: 13px; font-weight: 500">Primary</span>
            <span class="tc-cap" style="font-size: 11px">headlines, fixture names</span>
            <span class="tc-cap" style="font-family:var(--font-mono); font-size:10px">#F2F0E8</span>
          </div>
        
          <div style="display:grid;grid-template-columns:24px 90px 1fr 120px;gap:14px;align-items:center">
            <span style="width:18px;height:18px;border-radius:4px;background:#E8E6DF"></span>
            <span style="color:#E8E6DF; font-size: 13px; font-weight: 500">Secondary</span>
            <span class="tc-cap" style="font-size: 11px">body, leg titles</span>
            <span class="tc-cap" style="font-family:var(--font-mono); font-size:10px">#E8E6DF</span>
          </div>
        
          <div style="display:grid;grid-template-columns:24px 90px 1fr 120px;gap:14px;align-items:center">
            <span style="width:18px;height:18px;border-radius:4px;background:#9A9890"></span>
            <span style="color:#9A9890; font-size: 13px; font-weight: 500">Muted</span>
            <span class="tc-cap" style="font-size: 11px">sub-lines, captions</span>
            <span class="tc-cap" style="font-family:var(--font-mono); font-size:10px">#9A9890</span>
          </div>
        
          <div style="display:grid;grid-template-columns:24px 90px 1fr 120px;gap:14px;align-items:center">
            <span style="width:18px;height:18px;border-radius:4px;background:#7A7870"></span>
            <span style="color:#7A7870; font-size: 13px; font-weight: 500">Hint</span>
            <span class="tc-cap" style="font-size: 11px">meta labels, hints</span>
            <span class="tc-cap" style="font-family:var(--font-mono); font-size:10px">#7A7870</span>
          </div>
        
          <div style="display:grid;grid-template-columns:24px 90px 1fr 120px;gap:14px;align-items:center">
            <span style="width:18px;height:18px;border-radius:4px;background:#5A5852"></span>
            <span style="color:#5A5852; font-size: 13px; font-weight: 500">Faint</span>
            <span class="tc-cap" style="font-size: 11px">disabled, caveats</span>
            <span class="tc-cap" style="font-family:var(--font-mono); font-size:10px">#5A5852</span>
          </div>
        
      </div>
    </div>
</div>
</body></html>
