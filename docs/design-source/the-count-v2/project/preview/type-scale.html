<!doctype html>
<html><head>
<meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html, body { margin:0; background:#08090B; height:100%; }
  .preview-card {
    position: relative;
    width: 100%;
    min-height: 240px;
    padding: 20px 22px;
    box-sizing: border-box;
    font-family: var(--font-sans);
    color: var(--t-pri);
    overflow: hidden;
  }
  .preview-card .bg-gradients {
    position: absolute; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,181,58,0.08) 0%, transparent 60%),
      radial-gradient(circle 60% at 90% 100%, rgba(29,110,86,0.06) 0%, transparent 65%);
  }
  .preview-card > .content { position: relative; z-index: 1; }
  
</style>
</head><body>
<div class="preview-card">
  <div class="bg-gradients"></div>
  <div class="content">
      <div style="display:flex;flex-direction:column;gap:10px">
        <div style="display:flex;align-items:baseline;gap:14px"><span class="tc-h1">27</span><span class="tc-cap">H1 · 500 · -0.4 LS</span></div>
        <div style="display:flex;align-items:baseline;gap:14px"><span class="tc-h2">22</span><span class="tc-cap">H2 · 500 · -0.2 LS</span></div>
        <div style="display:flex;align-items:baseline;gap:14px"><span class="tc-h3" style="font-size:14px">14</span><span class="tc-cap">H3 · 500</span></div>
        <div style="display:flex;align-items:baseline;gap:14px"><span class="tc-body-em">13</span><span class="tc-cap">Body emphasis · 500</span></div>
        <div style="display:flex;align-items:baseline;gap:14px"><span class="tc-body">13</span><span class="tc-cap">Body · 400</span></div>
        <div style="display:flex;align-items:baseline;gap:14px"><span class="tc-cap" style="font-size:11px">11</span><span class="tc-cap">Caption · 400 · muted</span></div>
        <div style="display:flex;align-items:baseline;gap:14px"><span class="tc-micro" style="color:var(--t-hint)">10</span><span class="tc-cap">Micro · mono · 0.4 LS · UPPER</span></div>
      </div>
    </div>
</div>
</body></html>
