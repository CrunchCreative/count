<!doctype html>
<html><head>
<meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html, body { margin:0; background:#08090B; height:100%; }
  .preview-card {
    position: relative;
    width: 100%;
    min-height: 140px;
    padding: 20px 22px;
    box-sizing: border-box;
    font-family: var(--font-sans);
    color: var(--t-pri);
    overflow: hidden;
  }
  .preview-card .bg-gradients {
    position: absolute; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,181,58,0.08) 0%, transparent 60%),
      radial-gradient(circle 60% at 90% 100%, rgba(29,110,86,0.06) 0%, transparent 65%);
  }
  .preview-card > .content { position: relative; z-index: 1; }
  
</style>
</head><body>
<div class="preview-card">
  <div class="bg-gradients"></div>
  <div class="content">
      <div class="tc-cap" style="margin-bottom: 12px; color: var(--t-mut)">Fixture quality score · 0–100 · sits top-right of every fixture card</div>
      <div style="display:flex;align-items:center;gap:14px">
        <div style="text-align:center">
          <span class="signal-badge high"><span>SIGNAL</span><span>92</span></span>
          <div class="tc-cap" style="margin-top:8px;font-size:10px">≥ 85 amber</div>
        </div>
        <div style="text-align:center">
          <span class="signal-badge mid"><span>SIGNAL</span><span>74</span></span>
          <div class="tc-cap" style="margin-top:8px;font-size:10px">65 – 84 teal</div>
        </div>
        <div style="text-align:center">
          <span class="signal-badge low"><span>SIGNAL</span><span>58</span></span>
          <div class="tc-cap" style="margin-top:8px;font-size:10px">&lt; 65 muted</div>
        </div>
      </div>
    </div>
</div>
</body></html>
