<!doctype html>
<html><head>
<meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html, body { margin:0; background:#08090B; height:100%; }
  .preview-card {
    position: relative;
    width: 100%;
    min-height: 230px;
    padding: 20px 22px;
    box-sizing: border-box;
    font-family: var(--font-sans);
    color: var(--t-pri);
    overflow: hidden;
  }
  .preview-card .bg-gradients {
    position: absolute; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,181,58,0.08) 0%, transparent 60%),
      radial-gradient(circle 60% at 90% 100%, rgba(29,110,86,0.06) 0%, transparent 65%);
  }
  .preview-card > .content { position: relative; z-index: 1; }
  
</style>
</head><body>
<div class="preview-card">
  <div class="bg-gradients"></div>
  <div class="content">
      <div class="tc-cap" style="margin-bottom: 12px; color: var(--t-mut)">The signature page wash · fixed beneath all content</div>
      <div style="
        position: relative;
        height: 160px;
        border-radius: 12px;
        background: #08090B;
        overflow: hidden;
        border: 0.5px solid var(--b-def);
      ">
        <div style="
          position: absolute; inset: 0;
          background:
            radial-gradient(ellipse 90% 50% at 50% 0%, rgba(232,181,58,0.14) 0%, rgba(232,181,58,0.06) 28%, rgba(29,110,86,0.04) 55%, rgba(8,9,11,0) 75%),
            radial-gradient(circle 60% at 90% 95%, rgba(29,110,86,0.10) 0%, rgba(8,9,11,0) 65%);
        "></div>
      </div>
    </div>
</div>
</body></html>
