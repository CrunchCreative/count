<!doctype html>
<html><head>
<meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html, body { margin:0; background:#08090B; height:100%; }
  .preview-card {
    position: relative;
    width: 100%;
    min-height: 200px;
    padding: 20px 22px;
    box-sizing: border-box;
    font-family: var(--font-sans);
    color: var(--t-pri);
    overflow: hidden;
  }
  .preview-card .bg-gradients {
    position: absolute; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,181,58,0.08) 0%, transparent 60%),
      radial-gradient(circle 60% at 90% 100%, rgba(29,110,86,0.06) 0%, transparent 65%);
  }
  .preview-card > .content { position: relative; z-index: 1; }
  
</style>
</head><body>
<div class="preview-card">
  <div class="bg-gradients"></div>
  <div class="content">
      <div class="tc-cap" style="margin-bottom: 14px; color: var(--t-mut)">Bespoke stroke-icon set · 24×24 viewBox · 1.5-stroke · monochrome currentColor</div>
      <div style="display:grid;grid-template-columns:repeat(8, 1fr); gap: 14px; color: var(--t-mut)">
        
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2zM9 22V12h6v10"/>
            </svg>
            <span class="tc-cap" style="font-size: 9px; font-family: var(--font-mono); color: var(--t-faint)">home</span>
          </div>
        
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 4h18v18H3zM16 2v6M8 2v6M3 10h18"/>
            </svg>
            <span class="tc-cap" style="font-size: 9px; font-family: var(--font-mono); color: var(--t-faint)">calendar</span>
          </div>
        
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 11m-8 0a8 8 0 1 0 16 0 8 8 0 1 0-16 0M21 21l-4.35-4.35"/>
            </svg>
            <span class="tc-cap" style="font-size: 9px; font-family: var(--font-mono); color: var(--t-faint)">search</span>
          </div>
        
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5zM2 12l10 5 10-5M2 17l10 5 10-5"/>
            </svg>
            <span class="tc-cap" style="font-size: 9px; font-family: var(--font-mono); color: var(--t-faint)">builders</span>
          </div>
        
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9z M19 14l.7 2.3L22 17l-2.3.7L19 20l-.7-2.3L16 17z"/>
            </svg>
            <span class="tc-cap" style="font-size: 9px; font-family: var(--font-mono); color: var(--t-faint)">sparkles</span>
          </div>
        
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 3 2 3 10 12.46 10 19 14 21 14 12.46Z"/>
            </svg>
            <span class="tc-cap" style="font-size: 9px; font-family: var(--font-mono); color: var(--t-faint)">filter</span>
          </div>
        
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
            </svg>
            <span class="tc-cap" style="font-size: 9px; font-family: var(--font-mono); color: var(--t-faint)">bookmark</span>
          </div>
        
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 6L9 17l-5-5"/>
            </svg>
            <span class="tc-cap" style="font-size: 9px; font-family: var(--font-mono); color: var(--t-faint)">check</span>
          </div>
        
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
            <span class="tc-cap" style="font-size: 9px; font-family: var(--font-mono); color: var(--t-faint)">x</span>
          </div>
        
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
            <span class="tc-cap" style="font-size: 9px; font-family: var(--font-mono); color: var(--t-faint)">arrow-right</span>
          </div>
        
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            <span class="tc-cap" style="font-size: 9px; font-family: var(--font-mono); color: var(--t-faint)">plus</span>
          </div>
        
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 12m-10 0a10 10 0 1 0 20 0 10 10 0 1 0-20 0M12 16v-4M12 8h.01"/>
            </svg>
            <span class="tc-cap" style="font-size: 9px; font-family: var(--font-mono); color: var(--t-faint)">info</span>
          </div>
        
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5zM2 12l10 5 10-5M2 17l10 5 10-5"/>
            </svg>
            <span class="tc-cap" style="font-size: 9px; font-family: var(--font-mono); color: var(--t-faint)">layers</span>
          </div>
        
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 12m-10 0a10 10 0 1 0 20 0 10 10 0 1 0-20 0M12 12m-6 0a6 6 0 1 0 12 0 6 6 0 1 0-12 0M12 12m-2 0a2 2 0 1 0 4 0 2 2 0 1 0-4 0"/>
            </svg>
            <span class="tc-cap" style="font-size: 9px; font-family: var(--font-mono); color: var(--t-faint)">target</span>
          </div>
        
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v15"/>
            </svg>
            <span class="tc-cap" style="font-size: 9px; font-family: var(--font-mono); color: var(--t-faint)">share</span>
          </div>
        
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <span class="tc-cap" style="font-size: 9px; font-family: var(--font-mono); color: var(--t-faint)">bell</span>
          </div>
        
      </div>
    </div>
</div>
</body></html>
