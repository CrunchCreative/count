window.ResizeObserver = class { observe() {} unobserve() {} disconnect() {} };
window.addEventListener('error', (e) => {
  if (e.message && String(e.message).indexOf('ResizeObserver') !== -1) {
    e.stopImmediatePropagation();
    e.preventDefault();
  }
}, true);
</script>

// Pre-populate slip via a wrapping context with given legs
function ScopedSlipProvider({ legs = [], sheetOpen = false, saveModalOpen = false, builders = SEED_BUILDERS, children }) {
  return (
    <SlipProvider
      initialBuilders={builders}
    >
      <SlipBootstrap legs={legs} sheetOpen={sheetOpen} saveModalOpen={saveModalOpen}>
        {children}
      </SlipBootstrap>
    </SlipProvider>
  );
}

function SlipBootstrap({ legs, sheetOpen, saveModalOpen, children }) {
  const slip = useSlip();
  const initRef = React.useRef(false);
  React.useLayoutEffect(() => {
    if (initRef.current) return;
    initRef.current = true;
    legs.forEach(l => slip.addLeg(l));
    if (sheetOpen) slip.setSheetOpen(true);
    if (saveModalOpen) {
      slip.setSheetOpen(true);
      slip.setSaveModalOpen(true);
    }
  }, []);
  return children;
}
